name: Deploy Hermes ASU Worker

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'workers/hermes-asu/**'
      - '.github/workflows/deploy-hermes-asu.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --cwd workers/hermes-asu

      - name: Deploy to Cloudflare
        run: |
          cd workers/hermes-asu
          bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
