name: Build Hermes OpenWrt Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'hosts/hermes/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/build-hermes.yaml'
  pull_request:
    paths:
      - 'hosts/hermes/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/build-hermes.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build hermes image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          diagnostic-endpoint: ""

      - name: Build hermes image
        run: nix build .#hermes

      - name: List build output
        run: ls -la result/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-firmware
          path: result/
          retention-days: 30

      - name: Generate Hermes metadata artifacts
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Result tree (files) ==="
          find -L result -type f | LC_ALL=C sort

          mapfile -t sysupgrade_candidates < <(find -L result -type f -name '*sysupgrade*.bin' | LC_ALL=C sort)
          firmware_path="${sysupgrade_candidates[0]:-}"

          if [ -z "$firmware_path" ]; then
            mapfile -t sysupgrade_any_ext < <(find -L result -type f -name '*sysupgrade*' ! -name '*.sha256' ! -name '*.json' ! -name '*.txt' | LC_ALL=C sort)
            firmware_path="${sysupgrade_any_ext[0]:-}"
          fi
          if [ -z "$firmware_path" ]; then
            mapfile -t firmware_candidates < <(find -L result -type f -name '*.bin' | LC_ALL=C sort)
            firmware_path="${firmware_candidates[0]:-}"
          fi
          if [ -z "$firmware_path" ]; then
            mapfile -t firmware_like_candidates < <(find -L result -type f \( -name '*factory*' -o -name '*squashfs*' -o -name '*.itb' -o -name '*.img' -o -name '*.img.gz' -o -name '*.ubi' -o -name '*.trx' \) ! -name '*.sha256' ! -name '*.json' ! -name '*.txt' | LC_ALL=C sort)
            firmware_path="${firmware_like_candidates[0]:-}"
          fi
          if [ -z "$firmware_path" ]; then
            echo "No firmware binary found under result/"
            exit 1
          fi

          firmware_name="$(basename "$firmware_path")"
          firmware_sha256="$(sha256sum "$firmware_path" | awk '{print $1}')"
          build_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          openwrt_version="$(python3 - "$firmware_name" <<'PY'
import re
import sys

name = sys.argv[1]
match = re.match(r"^openwrt-([^-]+)-", name)
print(match.group(1) if match else "snapshot")
PY
)"
          version_code="${openwrt_version}-${GITHUB_SHA::7}"
          openwrt_input_hash="$(python3 - <<'PY'
import json

with open("flake.lock", "r", encoding="utf-8") as fh:
    data = json.load(fh)

nar_hash = data["nodes"]["openwrt-imagebuilder"]["locked"]["narHash"]
print(nar_hash.replace("sha256-", "").replace("+", "-").replace("/", "_").rstrip("="))
PY
)"
          target="qualcommax/ipq807x"
          profile="hermes"
          supported_devices='["mercusys,mr90x-v1"]'
          public_base_url="https://github.com/kreatoo/dots-mac/releases/latest/download"

          release_tag="hermes-${openwrt_version}-${openwrt_input_hash}"
          release_name="Hermes build ${openwrt_version} (${openwrt_input_hash})"
          {
            echo "openwrt_version=${openwrt_version}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "$GITHUB_OUTPUT"

          metadata_root="dist/metadata"
          asu_root="${metadata_root}/json/v1"
          release_root="${asu_root}/releases/${openwrt_version}/targets/${target}"
          firmware_root="${metadata_root}/releases/${GITHUB_SHA}/firmware"

          mkdir -p "$release_root" "$firmware_root"

          cp "$firmware_path" "${firmware_root}/${firmware_name}"
          cp "hosts/hermes/metadata/overview.json" "${asu_root}/overview.json"

          OPENWRT_VERSION="$openwrt_version" \
          VERSION_CODE="$version_code" \
          TARGET="$target" \
          PROFILE="$profile" \
          SUPPORTED_DEVICES="$supported_devices" \
          FIRMWARE_NAME="$firmware_name" \
          FIRMWARE_SHA256="$firmware_sha256" \
          BUILD_AT="$build_at" \
          PUBLIC_BASE_URL="$public_base_url" \
          python3 hosts/hermes/metadata/generate_metadata.py
      - name: Generate firmware checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd "dist/metadata/releases/${GITHUB_SHA}/firmware" && sha256sum *.bin > sha256sums.txt)

      - name: Upload metadata artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: hermes-metadata
          path: dist/metadata/
          retention-days: 30

      - name: Prepare release assets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/metadata/hermes-latest.json release-assets/hermes-latest.json
          cp dist/metadata/json/v1/overview.json release-assets/overview.json
          cp "dist/metadata/json/v1/releases/${{ steps.metadata.outputs.openwrt_version }}/targets/qualcommax/ipq807x/hermes.json" release-assets/hermes-profile.json
          cp dist/metadata/releases/${GITHUB_SHA}/firmware/*.bin release-assets/
          cp dist/metadata/releases/${GITHUB_SHA}/firmware/sha256sums.txt release-assets/

      - name: Publish GitHub Release assets
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/hermes-latest.json
            release-assets/overview.json
            release-assets/hermes-profile.json
            release-assets/*.bin
            release-assets/sha256sums.txt
